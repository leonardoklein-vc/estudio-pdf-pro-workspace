<script>
/* ==========================================================================
   MÓDULO DE PDF VISUAL (STATE MACHINE, DRAG&DROP, ROTATE, EXTRACT, SPLIT)
   ========================================================================== */

// Variáveis de Estado Global (Mantidas fora para persistirem durante a sessão)
let pdfState  = [];
let sourcePdfs = {};
let appMode   = 'split';
let cutPoints = new Set();
let lastSelectedIndex = -1;
let pdfjsLib = null; // 🟢 NOVA VARIÁVEL GLOBAL AQUI

/* --- MOTOR GLOBAL DE LEITURA EM VOZ ALTA (TTS - VERSÃO VOZES PREMIUM) --- */
window.LeitorTTS = {
  synth: window.speechSynthesis,
  utterance: null,
  isPaused: false,
  
  ler: function(texto, btnElement) {
    // 1. Lógica de Pausa/Retomada
    if (this.synth.speaking) {
      if (this.isPaused) {
        this.synth.resume();
        this.isPaused = false;
        if(btnElement) btnElement.innerHTML = '<i class="material-icons" style="font-size:16px;">pause</i>';
      } else {
        this.synth.pause();
        this.isPaused = true;
        if(btnElement) btnElement.innerHTML = '<i class="material-icons" style="font-size:16px;">play_arrow</i>';
      }
      return;
    }

    // 2. Limpeza de formatação para a IA ler de forma natural
    let textoLimpo = texto.replace(/<[^>]*>?/gm, '').replace(/[*#_]/g, '');
    this.utterance = new SpeechSynthesisUtterance(textoLimpo);
    
    // Deixando levemente mais lento para soar mais humano
    this.utterance.rate = 1.05; 
    
    // 🟢 O SEGREDO: CAÇADOR DE VOZES NEURAIS DO NAVEGADOR
    // O Chrome e o Edge possuem vozes secretas na nuvem muito superiores às locais
    let vozes = this.synth.getVoices();
    let vozPremium = 
        vozes.find(v => v.name.includes('Google português do Brasil')) || // Prioridade 1: Voz Neural do Chrome
        vozes.find(v => v.name.includes('Online (Natural)') || v.name.includes('Francisca')) || // Prioridade 2: Voz Neural do Edge
        vozes.find(v => v.lang === 'pt-BR' && v.name.includes('Online')) || // Prioridade 3: Qualquer voz em nuvem pt-BR
        vozes.find(v => v.lang === 'pt-BR'); // Fallback: Voz robótica do Windows/Mac
        
    if (vozPremium) {
        this.utterance.voice = vozPremium;
    } else {
        this.utterance.lang = 'pt-BR'; // Força o idioma se não achar a voz pelo nome
    }

    // 3. Salva o HTML original do botão para restaurar depois
    if (btnElement && !btnElement.dataset.htmlOriginal) {
        btnElement.dataset.htmlOriginal = btnElement.innerHTML;
    }

    this.utterance.onend = () => {
      this.isPaused = false;
      // Restaura o ícone original da ferramenta que chamou o áudio
      if(btnElement && btnElement.dataset.htmlOriginal) {
          btnElement.innerHTML = btnElement.dataset.htmlOriginal;
      }
    };

    // Muda o botão para estado de "Pausar"
    if(btnElement) {
        if (btnElement.innerText.trim().length > 0) {
            btnElement.innerHTML = '<i class="material-icons fs-6">pause</i> Pausar';
        } else {
            // Se for um botão pequeno (só ícone), mantém o tamanho pequeno
            btnElement.innerHTML = '<i class="material-icons" style="font-size:16px;">pause</i>';
        }
    }
    
    this.synth.speak(this.utterance);
  },

  parar: function() {
    this.synth.cancel();
    this.isPaused = false;
  }
};

// Trava de segurança: Parar a leitura se o usuário apertar ESC
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.LeitorTTS.parar(); });

// HACK PARA CARREGAR AS VOZES ANTECIPADAMENTE
// Navegadores demoram um pouco para buscar as vozes neurais na nuvem após abrir a página.
// Isso força o navegador a baixar a lista de vozes em background assim que o Estúdio abre.
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// 🟢 CACHE GLOBAL DE OCR
var ocrWordCache = {};

async function closeToolAndReturnToHub() {
  // Se a mesa estiver vazia, volta direto sem perguntar (produtividade)
  if (pdfState.length === 0) {
    executarRetorno();
    return;
  }

  // Se tem conteúdo, chama o diálogo de confirmação
  const confirmou = await appDialog({
    title: 'Sair da Ferramenta?',
    message: 'Se você sair agora, todo o trabalho na mesa de trabalho (ordem das páginas, marcações, cortes) será perdido.',
    confirmText: 'Sair e Perder Tudo',
    confirmColor: '#ef4444',
    icon: '⚠️',
    type: 'confirm'
  });
  
  if (confirmou) {
    executarRetorno();
  }
}

function executarRetorno() {
  document.getElementById('pdf-studio-view').style.display = 'none';
  
  // 🟢 Garante o fechamento dos dois workspaces alternativos antes de voltar ao Hub
  if (typeof fecharWorkspaceOcultar === 'function') fecharWorkspaceOcultar();
  if (typeof fecharWorkspaceRecorte === 'function') fecharWorkspaceRecorte();

function generateId() { 
  return Math.random().toString(36).substr(2, 9); 
}

function setPdfMode(mode) {
  appMode = mode;
  
  // Atualiza a classe do container principal para o CSS agir
  const previewArea = document.getElementById('pdf-preview-area');
  if(previewArea) previewArea.className = `pdf-preview-container mode-${mode} shadow-sm`;

  // Limpa o checkbox global se estiver saindo do modo extrair
  if (mode !== 'extract') {
    const chkAll = document.getElementById('chk-all-extract');
    if(chkAll) chkAll.checked = false;
  }
  
  // Re-renderiza a grade para limpar ícones de tesoura ou checkboxes
  renderPdfGrid();
}

/* --- CARREGAMENTO DE PDFS (CONSOLIDADO, UNIVERSAL E INTELIGENTE) --- */
async function loadPdfs(files, insertIndex = null) {
  if (!files || files.length === 0) return;

  // 1. Deduplicação de arquivos
  const uniqueFiles = Array.from(files).filter((file, index, self) =>
    index === self.findIndex((f) => f.name === file.name && f.size === file.size)
  );
  if (uniqueFiles.length === 0) return;

  // =========================================================================
  // 🧠 CÉREBRO UX: ANÁLISE DO LOTE E PREVENÇÃO DE ERROS (RÁPIDO)
  // =========================================================================
  const familiasChegando = uniqueFiles.map(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    if (['docx', 'doc'].includes(ext)) return 'word';
    if (['jpg', 'jpeg', 'png'].includes(ext)) return 'image';
    return 'pdf';
  });

  // 🟢 BLOQUEIO ESTRITO: Tentou enviar PDF e JPG/Word juntos no mesmo upload
  if (new Set(familiasChegando).size > 1) {
    if (typeof showToast === "function") showToast("Ação bloqueada: Não envie arquivos de tipos diferentes juntos.", "error");
    document.getElementById('pdf-add-input').value = "";
    return;
  }

  const familiaChegando = familiasChegando[0];
  const formatoAtualConversor = document.getElementById('convert-format') ? document.getElementById('convert-format').value : null;

  // REGRA 1: ANTI-MISTURA DA MESA (Se a mesa já tem algo)
  if (pdfState.length > 0) {
    let familiaNaMesa = 'pdf'; 
    if (currentTool === 'convert') {
      if (formatoAtualConversor === 'word2pdf') familiaNaMesa = 'word';
      if (formatoAtualConversor === 'img2pdf') familiaNaMesa = 'image';
    }

    // Compara o que está chegando com o que está na mesa
    if (familiaChegando !== familiaNaMesa) {
      const querLimpar = await appDialog({
        title: 'Formatos Diferentes',
        message: 'Você tentou misturar arquivos incompatíveis. Deseja limpar a mesa e começar com este novo?',
        confirmText: 'Limpar e Trocar',
        confirmColor: '#ef4444',
        icon: '⚠️',
        type: 'confirm'
      });
      
      if (!querLimpar) {
        document.getElementById('pdf-add-input').value = ""; // Reseta o input
        return;
      }
      realizarLimpeza(true); // O usuário aceitou, mata os antigos e segue.
    }
  }

  // =========================================================================
  // 🟢 GATILHO DE ALTERAÇÃO AUTOMÁTICA DE MODO (CONVERSOR)
  // =========================================================================
  if (currentTool === 'convert' && typeof setConverterFormat === 'function') {
    if (familiaChegando === 'word') {
      setConverterFormat('word2pdf');
    } else if (familiaChegando === 'image') {
      setConverterFormat('img2pdf');
    } else if (familiaChegando === 'pdf' && ['word2pdf', 'img2pdf'].includes(formatoAtualConversor)) {
      // Se o modo estava em importação e você jogou um PDF legítimo, volta para o padrão de exportar para JPG
      setConverterFormat('jpg');
    }
  }

  // =========================================================================
  // 🟢 TELA DE CARREGAMENTO GLOBAL
  // =========================================================================
  if (familiaChegando === 'word' || familiaChegando === 'image') {
    mostrarLoaderGlobal("Lendo e enviando para a nuvem. Aguarde...");
  } else {
    mostrarLoaderGlobal("Processando páginas do PDF...");
  }

  // Dá 150ms para o navegador renderizar o Loader na tela antes de prender a CPU
  await new Promise(resolve => setTimeout(resolve, 150));

  try {
    let newPages = [];

    // Loop de processamento de cada arquivo
    for (let file of uniqueFiles) {
      const ext = file.name.split('.').pop().toLowerCase();
      let arrayBuffer;
      let fileName = file.name;

      // ETAPA DE PREPARAÇÃO (Decisão: Processar local ou enviar p/ nuvem)
      if (ext === 'pdf') {
        arrayBuffer = await file.arrayBuffer();
      } 
      else if (['docx', 'doc', 'jpg', 'jpeg', 'png', 'xlsx', 'pptx'].includes(ext)) {
        mostrarLoaderGlobal(`Convertendo ${file.name} na nuvem...`);
        
        const base64Data = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(file);
        });

        const response = await executeBackendAction('CONVERT_TO_PDF', {
          fileData: base64Data,
          fileName: file.name
        });

        if (response && response.success) {
          try {
             const byteCharacters = atob(response.fileBase64);
             const bytes = new Uint8Array(byteCharacters.length);
             for (let i = 0; i < byteCharacters.length; i++) {
                 bytes[i] = byteCharacters.charCodeAt(i);
             }
             arrayBuffer = bytes.buffer;
             fileName = "Convertido_" + file.name.split('.')[0] + ".pdf";
          } catch(e) { 
             throw new Error("Erro na decodificação do arquivo gerado."); 
          }
        } else {
          throw new Error(response ? response.error : "Falha de conexão com a nuvem.");
        }
      } else { 
        continue; 
      }

      // ETAPA DE PROCESSAMENTO (Geração de miniaturas)
      mostrarLoaderGlobal(`Gerando miniaturas de ${fileName}...`);
      await new Promise(resolve => setTimeout(resolve, 50));

      const fileId = generateId();
      sourcePdfs[fileId] = arrayBuffer;
      
      const typedarray = new Uint8Array(arrayBuffer);
      const pdf = await pdfjsLib.getDocument({
        data: typedarray,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
        cMapPacked: true,
        standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/standard_fonts/',
        useWorkerFetch: true
      }).promise;

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.0 });
        const scale = 800 / viewport.width;

        const canvas = document.createElement("canvas");
        canvas.width = viewport.width * scale;
        canvas.height = viewport.height * scale;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: page.getViewport({ scale }) }).promise;

        newPages.push({
          id: generateId(),
          sourceFileId: fileId,
          originalPageNum: i,
          filename: fileName,
          thumbnailBase64: canvas.toDataURL('image/jpeg', 0.8),
          rotation: 0,
          selected: false,
          isBlank: false,
          redactions: [] 
        });
      }
    }

    // INSERÇÃO E ATUALIZAÇÃO DA UI
    if (newPages.length > 0) {
      saveState();
      if (insertIndex !== null && insertIndex < pdfState.length) {
        pdfState.splice(insertIndex, 0, ...newPages);
        const novosCortes = new Set();
        cutPoints.forEach(cut => novosCortes.add(cut < insertIndex ? cut : cut + newPages.length));
        cutPoints = novosCortes;
      } else {
        pdfState.push(...newPages);
      }
      
      renderPdfGrid();
      
      // 🟢 GATILHOS DE TRATAMENTO DE WORKSPACE PÓS-UPLOAD
      if (currentTool === 'redact' && typeof abrirWorkspaceOcultar === 'function') {
        abrirWorkspaceOcultar();
      }
      
      if (currentTool === 'crop' && typeof abrirWorkspaceRecorte === 'function') {
        abrirWorkspaceRecorte(); // 🧠 Acorda o visualizador de corte assim que o PDF carregar!
      }
    }

  } catch (err) {
    if (typeof showToast === "function") showToast(err.message || "Erro ao processar arquivo.", "error");
    console.error("Erro no loadPdfs:", err);
  } finally {
    document.getElementById('pdf-add-input').value = ""; 
    ocultarLoaderGlobal(); // Garante o fechamento da cortina de loading
  }
}

/* --- PÁGINA EM BRANCO --- */
function addBlankPage() {
  saveState(); // 🟢 Salva antes de adicionar
  pdfState.push({
    id: generateId(), 
    sourceFileId: null, 
    originalPageNum: 0,
    filename: "Pág. em Branco",
    thumbnailBase64: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=",
    rotation: 0, 
    selected: false, 
    isBlank: true
  });
  renderPdfGrid();
}

/* --- AÇÕES GLOBAIS --- */
function globalRotate(direction) {
  saveState(); // 🟢 Salva antes da rotação em massa
  pdfState.forEach(p => p.rotation = (p.rotation + direction) % 360);
  renderPdfGrid();
}

function rotatePage(id, direction) {
  const p = pdfState.find(x => x.id === id);
  if (p) { 
    saveState(); // 🟢 Salva antes da rotação individual
    p.rotation = (p.rotation + direction) % 360; 
    renderPdfGrid(); 
  }
}

function deletePage(id) {
  const index = pdfState.findIndex(p => p.id === id);
  if (index === -1) return;

  saveState(); // 🟢 Salva antes de deletar e reindexar os cortes
  
  // 1. Remove a página
  pdfState.splice(index, 1);
  
  // 2. Ajusta as tesouras
  const novosCortes = new Set();
  cutPoints.forEach(cut => {
    if (cut < index) {
      novosCortes.add(cut);
    } else if (cut > index) {
      novosCortes.add(cut - 1);
    }
  });
  cutPoints = novosCortes;

  renderPdfGrid();
}

function duplicatePage(id) {
  const index = pdfState.findIndex(p => p.id === id);
  if (index > -1) {
    saveState(); // 🟢 Salva antes de duplicar e reindexar os cortes
    
    // 1. Duplica a página
    pdfState.splice(index + 1, 0, { ...pdfState[index], id: generateId() });
    
    // 2. Ajusta as tesouras
    const novosCortes = new Set();
    cutPoints.forEach(cut => {
      if (cut <= index) {
        novosCortes.add(cut);
      } else {
        novosCortes.add(cut + 1);
      }
    });
    cutPoints = novosCortes;

    renderPdfGrid();
  }
}

/* --- SELEÇÃO DE PÁGINAS --- */
function togglePageSelection(id, event) {
  const index = pdfState.findIndex(x => x.id === id);
  if (index === -1) return;

  const isShift = event && event.shiftKey;
  
  // Se segurou Shift e já tinha clicado em outro antes
  if (isShift && lastSelectedIndex !== -1) {
    const start = Math.min(lastSelectedIndex, index);
    const end = Math.max(lastSelectedIndex, index);
    const targetState = !pdfState[index].selected; 
    
    // Pinta todo mundo entre o primeiro e o último clique
    for (let i = start; i <= end; i++) {
      pdfState[i].selected = targetState;
    }
  } else {
    // Clique normal
    pdfState[index].selected = !pdfState[index].selected;
  }
  
  lastSelectedIndex = index;
  renderPdfGrid();
}

function toggleSelectAll(isChecked) {
  pdfState.forEach(p => p.selected = isChecked);
  renderPdfGrid();
}

function excluirPaginasSelecionadas() {
  const selecionadas = pdfState.filter(p => p.selected);
  if (selecionadas.length === 0) {
    if(typeof showToast === "function") showToast("Nenhuma página selecionada.", "info");
    return;
  }
  
  // 🟢 Salva o estado antes de excluir
  saveState(); 

  // Mantém só as que NÃO estão selecionadas
  pdfState = pdfState.filter(p => !p.selected);
  
  // Limpa as tesouras por segurança
  cutPoints.clear(); 
  
  const chkAll = document.getElementById('chk-all-extract');
  if (chkAll) { chkAll.checked = false; }
  
  renderPdfGrid();
  if(typeof showToast === "function") showToast(`${selecionadas.length} página(s) excluída(s).`, "success");
}

/* --- CORTAR A CADA X PÁGINAS --- */
function applyBatchSplit() {
  const val = parseInt(document.getElementById('input-split-batch').value, 10);
  if (isNaN(val) || val < 1) {
    if(typeof showToast === "function") showToast("Informe um número válido de páginas.", "error");
    return;
  }
  if (!pdfState.length) {
    if(typeof showToast === "function") showToast("Carregue um PDF primeiro.", "info");
    return;
  }

  // 🟢 Salva o estado antes de alterar os cortes
  saveState();

  cutPoints.clear();
  for (let i = val - 1; i < pdfState.length - 1; i += val) { cutPoints.add(i); }
  renderPdfGrid();
  if(typeof showToast === "function") showToast(`Cortes automáticos aplicados a cada ${val} página(s).`, "success");
}

function resetAllCuts() {
  // 🟢 Salva o estado antes de limpar os cortes
  saveState();
  
  cutPoints.clear();
  renderPdfGrid();
  if(typeof showToast === "function") showToast("Cortes resetados.", "info");
}

/* --- LUPA EM TELA CHEIA E NAVEGAÇÃO DE ZOOM --- */
let currentZoomIndex = 0; // 🟢 Variável de controle do Zoom

function showLargePreview(id) {
  const index = pdfState.findIndex(p => p.id === id);
  if (index > -1) {
    currentZoomIndex = index; // 🟢 Guarda a posição que o usuário clicou
    const page = pdfState[index];
    const img = document.getElementById('img-large-preview');
    const modalEl = document.getElementById('modalPdfPreview');
    
    if (!img || !modalEl) return;

    // Atualiza a imagem e a rotação
    img.src = page.thumbnailBase64;
    img.setAttribute('data-rotation', page.rotation);
    img.style.transform = `rotate(${page.rotation}deg)`;
    
    if (page.rotation % 180 !== 0) {
      img.classList.add('preview-rotate-90');
    } else {
      img.classList.remove('preview-rotate-90');
    }

    // 🟢 Atualiza os números no navegador (Pill)
    document.getElementById('zoom-current-page').innerText = currentZoomIndex + 1;
    document.getElementById('zoom-total-pages').innerText = pdfState.length;

    modalEl.classList.add('show');
  }
}

// 🟢 NOVA FUNÇÃO: Troca de página mantendo rotações e proporções
function navegarZoom(direcao, event) {
  if (event) event.stopPropagation();
  if (!pdfState || pdfState.length === 0) return;

  // Atualiza o índice em loop infinito (vai do fim pro início e vice-versa)
  currentZoomIndex += direcao;
  if (currentZoomIndex < 0) {
    currentZoomIndex = pdfState.length - 1;
  } else if (currentZoomIndex >= pdfState.length) {
    currentZoomIndex = 0;
  }

  const page = pdfState[currentZoomIndex];
  const imgPreview = document.getElementById('img-large-preview');
  
  if(page && page.thumbnailBase64) {
      imgPreview.src = page.thumbnailBase64;
      imgPreview.setAttribute('data-rotation', page.rotation);
      imgPreview.style.transform = `rotate(${page.rotation}deg)`;
      
      if (page.rotation % 180 !== 0) {
        imgPreview.classList.add('preview-rotate-90');
      } else {
        imgPreview.classList.remove('preview-rotate-90');
      }
  }

  // Atualiza os números no Pill
  document.getElementById('zoom-current-page').innerText = currentZoomIndex + 1;
  document.getElementById('zoom-total-pages').innerText = pdfState.length;
}

// 🟢 NOVO LISTENER: Adiciona suporte as setas do teclado e ao ESC para fechar
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('modalPdfPreview');
  // Se o modal de zoom estiver aberto
  if (modal && modal.classList.contains('show')) {
    if (e.key === 'ArrowLeft') navegarZoom(-1);
    if (e.key === 'ArrowRight') navegarZoom(1);
    if (e.key === 'Escape') {
      modal.classList.remove('show');
      modal.classList.add('d-none');
      modal.style.display = 'none';
    }
  }
});

/* --- RENDERIZAÇÃO DA GRADE (VERSÃO CONSOLIDADA DEFINITIVA) --- */
var draggedIndex = null; // Usando var para evitar o erro de re-declaração

/* --- RENDERIZAÇÃO DA GRADE (VERSÃO CONSOLIDADA DEFINITIVA COM TTS DINÂMICO) --- */
function renderPdfGrid() {
  const container = document.getElementById('pdf-preview-area');
  const controlsBar = document.getElementById('workspace-controls-bar'); // Nova barra de ordenação
  
  if (!container) {
    console.error("Área de preview (pdf-preview-area) não encontrada no HTML!");
    return;
  }

  // 🟢 MENSAGEM CORRETA E CONSISTENTE QUANDO A MESA FICA VAZIA
  if (pdfState.length === 0) {
    container.innerHTML = `
      <div class="w-100 h-100 d-flex flex-column align-items-center justify-content-center text-muted" style="min-height: 300px;">
        <i class="material-icons empty-state-icon" style="font-size: 80px;">post_add</i>
        <h4 class="mt-3 fw-bold text-secondary">Solte ou adicione seus arquivos aqui</h4>
        <p class="opacity-75">Suporta PDF, Word e Imagens.</p>
      </div>
    `;
    
    // Esconde a barra de ações em lote, se existir
    const bulkBar = document.getElementById('bulk-action-bar');
    if (bulkBar) bulkBar.style.display = 'none';

    // Esconde a barra de ordenação/lista

    // --- GATILHO TTS DINÂMICO: Esconde o botão se a mesa esvaziar ---

    return;
  }

  if (controlsBar && appMode !== 'chat') {

  }

  // Prepara o container para os novos elementos
  container.innerHTML = "";
  const cursorStyle = appMode === 'extract' ? 'pointer' : (appMode === 'redact' ? 'crosshair' : 'default');

  pdfState.forEach((page, index) => {

    const isInicioDeSegmento = (index === 0 || cutPoints.has(index - 1));
    let badgeHtml = "";
    
    if (appMode === 'split' && isInicioDeSegmento) {
      const segIdx = Array.from(cutPoints).filter(c => c < index).length;
      const nome = nomesSegmentos.get(segIdx) || `Parte_${segIdx + 1}`;
      
      badgeHtml = `
        <div style="width: 100%; text-align: center; margin-bottom: 8px; z-index: 10; position: relative;">
           <span class="badge bg-primary text-white d-inline-flex align-items-center gap-1 shadow-sm py-2 px-3" 
                 style="font-size: 0.75rem; border-radius: 12px; cursor: pointer; transition: transform 0.2s;" 
                 title="Clique para renomear este trecho"
                 onmouseover="this.style.transform='scale(1.05)'"
                 onmouseout="this.style.transform='scale(1)'"
                 onclick="event.stopPropagation(); renomearTrecho(${segIdx})">
             <i class="material-icons" style="font-size: 14px;">edit</i> ${escapeHtml(nome)}
           </span>
        </div>
      `;
    }

    // Drag & Drop Handlers
    wrapper.ondragstart = () => { draggedIndex = index; wrapper.classList.add('dragging'); };
    wrapper.ondragend   = () => { wrapper.classList.remove('dragging'); };
    wrapper.ondragover  = (e) => { e.preventDefault(); wrapper.classList.add('drag-over'); };
    wrapper.ondragleave = () => { wrapper.classList.remove('drag-over'); };
    wrapper.ondrop = (e) => {
      e.preventDefault(); 
      wrapper.classList.remove('drag-over');
      if (draggedIndex === null || draggedIndex === index) return;
      saveState();
      const item = pdfState.splice(draggedIndex, 1)[0];
      pdfState.splice(index, 0, item);
      cutPoints.clear(); 
      renderPdfGrid();
    };

    const shortName = page.filename.length > 12 ? page.filename.substring(0, 10) + "..." : page.filename;

    // 🟢 Mágica do Recorte Visual no Grid Principal
    let clipCssGrid = '';
    if (page.cropBox) {
        const pTop = ((842 - page.cropBox.y - page.cropBox.height) / 842) * 100;
        const pLeft = (page.cropBox.x / 595) * 100;
        const pRight = 100 - ((page.cropBox.x + page.cropBox.width) / 595) * 100;
        const pBottom = (page.cropBox.y / 842) * 100;
        clipCssGrid = `clip-path: inset(${pTop}% ${pRight}% ${pBottom}% ${pLeft}%);`;
    }

    // 🟢 INDICADORES DO OCR (AGORA É UM BOTÃO GIGANTE E CLICÁVEL)
    let ocrBadge = page.extractedText ? 
      `<div class="badge bg-success position-absolute top-0 start-50 translate-middle-x mt-2 shadow-lg" 
             style="z-index: 100; cursor: pointer; padding: 6px 12px; border: 2px solid #fff;" 
             onclick="event.stopPropagation(); abrirModalLeituraOcr('${page.id}')" 
             title="Clique para ler o texto extraído">
         <i class="material-icons" style="font-size:14px; vertical-align: middle; margin-right: 2px;">text_snippet</i> LER TEXTO
       </div>` : '';

    // Monta o Card da Página (SEM variáveis fantasma)
    wrapper.innerHTML = `
      ${badgeHtml}
      ${ocrBadge}
      <input type="checkbox" class="pdf-extract-check" title="Selecionar" ${page.selected ? 'checked' : ''} onclick="event.stopPropagation(); togglePageSelection('${page.id}', event)">

      <div class="pdf-canvas-container" style="background: ${page.isBlank ? '#f8fafc' : '#fff'}; min-height: 150px; cursor: ${cursorStyle};" onclick="if(appMode === 'extract' || appMode === 'ocr') togglePageSelection('${page.id}', event)">
        <img src="${page.thumbnailBase64}" style="transform: rotate(${page.rotation}deg); ${clipCssGrid}">
        
        <div class="pdf-page-actions">
           <button class="pdf-action-btn" onclick="showLargePreview('${page.id}')"><i class="material-icons">zoom_in</i></button>
           <button class="pdf-action-btn" onclick="rotatePage('${page.id}', 90)"><i class="material-icons">rotate_right</i></button>
           <button class="pdf-action-btn" onclick="duplicatePage('${page.id}')"><i class="material-icons">control_point_duplicate</i></button>
           <button class="pdf-action-btn delete" onclick="deletePage('${page.id}')"><i class="material-icons">delete_outline</i></button>
        </div>
        <div class="wm-overlay"></div>
      </div>
      <div class="pdf-page-number">${page.isBlank ? 'Em branco' : shortName}<br><span class="opacity-75">Pág. ${page.originalPageNum}</span></div>
    `;

    // Renderização do Blackout (Redact)
    const canvas = wrapper.querySelector('.pdf-canvas-container');
    if (page.redactions && page.redactions.length > 0) {
      const scale = 595 / 140; 
      page.redactions.forEach(r => {
        const overlay = document.createElement('div');
        overlay.style.position = 'absolute';
        overlay.style.left = (r.x / scale) + 'px';
        overlay.style.top = ((842 - r.y - r.height) / scale) + 'px';
        overlay.style.width = (r.width / scale) + 'px';
        overlay.style.height = (r.height / scale) + 'px';
        overlay.style.background = 'black';
        overlay.style.zIndex = '30';
        canvas.appendChild(overlay);
      });
    }

    // Renderização de Tesouras (Modo Split)
    if (index < pdfState.length - 1) {
      const cutZone = document.createElement("div");
      const isCut   = cutPoints.has(index);
      cutZone.className = `pdf-cut-zone ${isCut ? 'is-cut' : ''}`;
      cutZone.innerHTML = `<div class="cut-icon-wrapper"><i class="material-icons">content_cut</i></div>`;
      cutZone.onclick = function () {
        if (cutPoints.has(index)) { cutPoints.delete(index); this.classList.remove("is-cut"); } 
        else { cutPoints.add(index); this.classList.add("is-cut"); }
        renderPdfGrid(); 
      };
      wrapper.appendChild(cutZone);
    }

    container.appendChild(wrapper);
  });

  if (typeof checarSelecao === 'function') checarSelecao();
  if (currentTool === 'watermark') atualizarPreviewWatermark();
  if (currentTool === 'paginate') atualizarPreviewPaginacao();
  if (currentTool === 'sign') atualizarPreviewAssinatura();

  // 🟢 A NOVA LINHA: Se um arquivo entrar e o chat estiver aberto, atualiza a barra lateral na hora!
  if (appMode === 'chat' && typeof prepararWorkspaceDoChat === 'function') {
    prepararWorkspaceDoChat();
  }

  // --- INÍCIO GATILHO TTS DINÂMICO (NOVO) ---
  const btnOuvir = document.getElementById('btn-ouvir-mesa');
  if (btnOuvir) {
    // hasText test: Existe alguma página com texto de OCR na memória?
    const temTexto = pdfState.some(p => p.extractedText && p.extractedText.trim().length > 0);
    
    if (temTexto && appMode !== 'chat') {

    }
  }
  // --- FIM GATILHO TTS DINÂMICO ---
}

// UTILS: Motor de montagem (compartilhado por todos)
async function montarPdfOtimizado(newPdf, pagesArray, loadedPdfs) {
  const copyMap = {};
  pagesArray.forEach((pDef, idx) => {
    if (!pDef.isBlank) {
      if (!copyMap[pDef.sourceFileId]) copyMap[pDef.sourceFileId] = { indices: [], destIndexes: [] };
      copyMap[pDef.sourceFileId].indices.push(pDef.originalPageNum - 1);
      copyMap[pDef.sourceFileId].destIndexes.push(idx);
    }
  });
  
  const finalPages = new Array(pagesArray.length);

  for (const fileId in copyMap) {
    const data = copyMap[fileId];
    const copied = await newPdf.copyPages(loadedPdfs[fileId], data.indices);
    copied.forEach((cp, i) => {
      const targetIdx = data.destIndexes[i];
      const pDef = pagesArray[targetIdx];
      cp.setRotation(PDFLib.degrees(cp.getRotation().angle + pDef.rotation));
      finalPages[targetIdx] = cp;
    });
  }

  for (let i = 0; i < pagesArray.length; i++) {
    if (pagesArray[i].isBlank) newPdf.addPage([595, 842]);
    else newPdf.addPage(finalPages[i]);
  }
}

/* --- DISPATCHER CENTRAL DE FINALIZAÇÃO (VERSÃO DEFINITIVA E SEGURA) --- */
async function processarPdfFinal() {
  if (!pdfState.length) {
    if (typeof showToast === "function") showToast("Nenhum arquivo na mesa.", "info");
    return;
  }

  // 1. Estados de UI: Bloqueia interface e mostra carregamento
  const loaderEl = document.getElementById("loader");
  const loaderMsgEl = document.getElementById("loader-msg");
  
  if (loaderEl) loaderEl.style.display = "flex";
  if (loaderMsgEl) loaderMsgEl.innerText = "Preparando documentos...";

  try {
    const loadedPdfs = {};
    // Mantemos o read_pdf de fora desta lista para poupar memória RAM (ele não precisa modificar o binário)
    const toolsNeedingPdfLib = [
      'merge', 'split', 'extract', 'protect', 
      'repair', 'paginate', 'watermark', 'redact', 'ocr', 'convert',
      'compress', 'sign', 'grayscale', 'metadata', 'extract_images',
      'crop', 'n_up', 'header_footer', 'summarize', 'translate',
      'quiz_generator', 'mindmap', 'chat', 'flatten', 'overlay'
    ];
    
    if (toolsNeedingPdfLib.includes(currentTool)) {
      for (let fileId in sourcePdfs) {
        loadedPdfs[fileId] = await PDFLib.PDFDocument.load(sourcePdfs[fileId], { 
          ignoreEncryption: true 
        });
      }
    }

    // 3. Roteamento Inteligente
    console.log(`Executando ferramenta: ${currentTool}`);
    
    switch(currentTool) {
      case 'merge':          await executarMerge(loadedPdfs); break;
      case 'split':          await executarSplit(loadedPdfs); break;
      case 'extract':        await executarExtrair(loadedPdfs); break;
      case 'convert':        await executarConversao(loadedPdfs); break;
      case 'protect':        await executarProteger(loadedPdfs); break;
      case 'repair':         await executarReparar(loadedPdfs); break;
      case 'paginate':       await executarPaginar(loadedPdfs); break;
      case 'watermark':      await executarMarcaDagua(loadedPdfs); break;
      case 'redact':         await executarRedact(loadedPdfs); break;
      case 'ocr':            await executarOCR(loadedPdfs); break;
      case 'compress':       await executarComprimir(loadedPdfs); break;
      case 'sign':           await executarAssinar(loadedPdfs); break;
      case 'grayscale':      await executarTonsDeCinza(loadedPdfs); break;
      case 'metadata':       await executarMetadados(loadedPdfs); break;
      case 'extract_images': await executarExtrairImagens(loadedPdfs); break;
      case 'crop':           await executarCrop(loadedPdfs); break;
      case 'n_up':           await executarNUp(loadedPdfs); break;
      case 'header_footer':  if(typeof executarHeaderFooter === 'function') await executarHeaderFooter(loadedPdfs); break;
      
      // IAs & Áudio
      case 'summarize':      await executarIA('summarize'); break;
      case 'translate':      await executarIA('translate'); break;
      case 'quiz_generator': await executarIA('quiz_generator'); break;
      case 'mindmap':        await executarIA('mindmap'); break;
      case 'chat':           return;
      case 'read_pdf':       await executarLeituraFerramenta(); break; // <--- 🟢 NOSSO GATILHO TTS AQUI
      case 'pdf_stats':       await executarEstatisticasPDF(); break;
      case 'remove_blank':    await executarRemocaoPaginasEmBranco(); break;
      case 'flatten':         await executarAchatarCamadas(loadedPdfs); break;
      case 'overlay':         await executarSobreposicaoTimbre(loadedPdfs); break;
      
      default: 
        throw new Error(`A ferramenta "${currentTool}" não está mapeada.`);
    }

  } catch (err) {
    console.error("Erro no processamento:", err);
    if (typeof showToast === "function") showToast(err.message || "Erro ao processar PDF.", "error");
  } finally {
    // 4. Limpeza de UI: Esconde o loader independentemente de sucesso ou erro
    if (loaderEl) loaderEl.style.display = "none";
  }
}

/* ==========================================================================
   FERRAMENTA: LEITOR DE PDF EM VOZ ALTA (TTS)
   ========================================================================== */
async function executarLeituraFerramenta() {
    // 1. Se já está falando, o botão "Iniciar Leitura" virou "Pause/Play". 
    // Então, ao clicar, ele apenas pausa/retoma.
    if (window.LeitorTTS && window.LeitorTTS.synth.speaking) {
        const btnAcao = document.getElementById('btn-workspace-action');
        window.LeitorTTS.ler('', btnAcao); // Enviar texto vazio apenas alterna o Play/Pause
        return;
    }

    // 2. Primeira Execução: Extrair o texto
    if (typeof mostrarLoaderGlobal === 'function') {
        mostrarLoaderGlobal("Analisando páginas e preparando a voz...");
    }

    try {
        // Usa a sua função nativa poderosa que já entende OCR e seleção de páginas
        const textoExtraido = await extrairTextoDasPaginasSelecionadas(); 
        
        if (!textoExtraido || textoExtraido.trim() === '') {
            throw new Error("Nenhum texto encontrado. Se for uma imagem/scan, rode a ferramenta OCR na tela inicial primeiro.");
        }

        if (typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        
        // 3. Pega o botão principal de ação do Workspace e envia pro motor TTS
        // O motor TTS vai trocar o ícone dele de "Play" para "Pause" magicamente.
        const btnAcao = document.getElementById('btn-workspace-action');
        
        // Dispara a leitura!
        window.LeitorTTS.ler(textoExtraido, btnAcao);

    } catch (error) {
        console.error("Erro no Leitor PDF:", error);
        if (typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        if (typeof showToast === "function") {
            showToast(error.message, "error");
        }
    }
}

/* --- EXECUTAR DIVISÃO (COM NOMES PERSONALIZADOS) --- */
async function executarSplit(loadedPdfs) {
  const zip = new JSZip();
  const cutsArray = Array.from(cutPoints).sort((a, b) => a - b);
  let ranges = [], start = 0;
  
  for (let cut of cutsArray) { ranges.push({ start, end: cut }); start = cut + 1; }
  ranges.push({ start, end: pdfState.length - 1 });
  
  for (let i = 0; i < ranges.length; i++) {
    const newPdf = await PDFLib.PDFDocument.create();
    const pagesForThisPart = pdfState.slice(ranges[i].start, ranges[i].end + 1);
    await montarPdfOtimizado(newPdf, pagesForThisPart, loadedPdfs);
    
    // 🟢 A Mágica dos Nomes: Pega o nome customizado ou usa o padrão
    let nomeBase = nomesSegmentos.get(i) || `Parte_${i + 1}`;
    // Limpa caracteres que quebram o download em formato ZIP
    let nomeArquivo = String(nomeBase).replace(/[/\\?%*:|"<>]/g, '-');
    
    zip.file(`${nomeArquivo}.pdf`, await newPdf.save());
  }
  baixarArquivo(await zip.generateAsync({ type: "blob", compression: "STORE" }), "Documentos_Divididos.zip");
}

async function executarMerge(loadedPdfs) {
  // Cria um novo PDF do zero
  const newPdf = await PDFLib.PDFDocument.create();
  
  // Usa o nosso motor otimizado para copiar todas as páginas do pdfState
  // Passamos o pdfState completo, pois o Merge quer tudo o que está na mesa
  await montarPdfOtimizado(newPdf, pdfState, loadedPdfs);
  
  // Salva e baixa
  const pdfBytes = await newPdf.save();
  baixarArquivo(pdfBytes, "Mesclado_Final.pdf");
  
  if(typeof showToast === "function") showToast("PDF mesclado com sucesso!", "success");
}

/* --- FERRAMENTA: CONVERSOR UNIVERSAL (CORRIGIDO) --- */
async function executarConversao(loadedPdfs) {
  const format = document.getElementById('convert-format').value;
  const selectedPages = pdfState.filter(p => p.selected);
  const pagesToConvert = selectedPages.length > 0 ? selectedPages : pdfState;

  if (pagesToConvert.length === 0) {
    if (typeof showToast === "function") showToast("Nenhuma página disponível.", "warning");
    return;
  }

  // 1. LÓGICA LOCAL: IMAGENS (JPG / PNG)
  if (format === 'jpg' || format === 'png') {
    const zip = new JSZip();
    pagesToConvert.forEach((page) => {
      const base64Data = page.thumbnailBase64.split(',')[1];
      const fileName = `Pagina_${page.originalPageNum}_${page.filename.replace(/\.[^/.]+$/, "")}.${format}`;
      zip.file(fileName, base64Data, {base64: true});
    });
    const content = await zip.generateAsync({ type: "blob", compression: "STORE" });
    baixarArquivo(content, `Imagens_Extraidas_${format.toUpperCase()}.zip`);
    if (typeof showToast === "function") showToast(`${pagesToConvert.length} imagens extraídas!`, "success");
    return;
  }

  // 2. LÓGICA DE IMPORTAÇÃO (WORD/IMG -> PDF)
  if (format === 'word2pdf' || format === 'img2pdf') {
    if (pdfState.length === 0) return showToast("Carregue o arquivo primeiro.", "warning");
    
    mostrarLoaderGlobal("Gerando PDF final...");
    try {
      // 🟢 OTIMIZAÇÃO: O loadPdfs JÁ converteu os arquivos originais.
      // Basta juntar a mesa de trabalho atual e baixar!
      const pdfBytes = await getPdfBytesFromState();
      baixarArquivo(new Blob([pdfBytes], {type: "application/pdf"}), "Documento_Convertido.pdf");
      if (typeof showToast === "function") showToast("Conversão concluída!", "success");
    } catch(err) { 
      if (typeof showToast === "function") showToast("Erro ao gerar arquivo final.", "error"); 
    } finally { ocultarLoaderGlobal(); }
    return;
  }

  // 3. LÓGICA DE EXPORTAÇÃO NUVEM (PDF -> OFFICE: DOCX/XLSX/PPTX)
  mostrarLoaderGlobal(`Conectando à nuvem para gerar ${format.toUpperCase()}...`);
  try {
    const response = await executeBackendAction('CONVERT_PDF_OFFICE', {
      fileData: await getBase64FromState(), // Agora seguro contra memory leak
      format: format,
      fileName: pagesToConvert[0].filename.replace(/\.[^/.]+$/, "")
    });

    if (response && response.success && response.fileBase64) {
      baixarArquivo(base64ToBlob(response.fileBase64), `${pagesToConvert[0].filename.replace(/\.[^/.]+$/, "")}.${response.extension || format}`);
      if(typeof showToast === "function") showToast(`Convertido para ${format.toUpperCase()}!`, "success");
    } else {
      throw new Error(response.error || "Resposta inválida do servidor.");
    }
  } catch(err) {
    if(typeof showToast === "function") showToast(err.message || "Falha na conversão.", "error");
  } finally {
    ocultarLoaderGlobal();
  }
}

/* --- HELPERS AUXILIARES (CORRIGIDOS CONTRA CALL STACK OVERFLOW) --- */
async function getPdfBytesFromState() {
  const loadedPdfs = {};
  for (let fileId in sourcePdfs) {
    try { 
      loadedPdfs[fileId] = await PDFLib.PDFDocument.load(sourcePdfs[fileId], { ignoreEncryption: true }); 
    } catch (e) { console.error(e); }
  }
  const tempPdf = await PDFLib.PDFDocument.create();
  // Usa o seu motor otimizado
  await montarPdfOtimizado(tempPdf, pdfState, loadedPdfs); 
  return await tempPdf.save();
}

async function getBase64FromState() {
  const bytes = await getPdfBytesFromState();
  // 🟢 CORREÇÃO DO RANGE ERROR: O loop iterativo evita o estouro de memória
  let binary = '';
  const len = bytes.byteLength;
  for (let i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function base64ToBlob(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], {type: "application/octet-stream"});
}

/* --- FERRAMENTA: PROTEGER (PDF COM SENHA E MODAL CUSTOMIZADO) --- */
async function executarProteger(loadedPdfs) {
  // 1. Esconde a tela de "Carregando" temporariamente para o usuário ver o modal
  const loaderEl = document.getElementById("loader");
  if (loaderEl) loaderEl.style.display = "none";

  // 2. Chama o Modal Prompt Customizado
  const password = await appDialog({
    title: 'Proteger PDF',
    message: 'Defina a senha criptografada exigida para abrir o documento:',
    inputType: 'password',
    placeholder: 'Sua senha secreta...',
    confirmText: 'Criptografar',
    icon: '🔐',
    type: 'prompt'
  });

  // Se o usuário cancelou ou fechou o modal
  if (!password) return; 

  // 3. Volta a exibir o loader enquanto processa a criptografia
  if (loaderEl) loaderEl.style.display = "flex";
  const loaderMsgEl = document.getElementById("loader-msg");
  if (loaderMsgEl) loaderMsgEl.innerText = "Criptografando documento...";

  try {
    const newPdf = await PDFLib.PDFDocument.create();
    await montarPdfOtimizado(newPdf, pdfState, loadedPdfs);
    const pdfBytes = await newPdf.save();
    
    // Importação via Skypack (resolve dependências órfãs automaticamente)
    const encryptModule = await import('https://cdn.skypack.dev/@pdfsmaller/pdf-encrypt-lite');
    
    // Prevenção extra caso o módulo exporte como 'default' dependendo do navegador
    const encryptPDF = encryptModule.encryptPDF || encryptModule.default.encryptPDF;
    
    const encryptedBytes = await encryptPDF(
      new Uint8Array(pdfBytes), 
      password, 
      password  
    );
    
    baixarArquivo(encryptedBytes, "PDF_Protegido.pdf");
    if(typeof showToast === "function") showToast("PDF protegido com senha!", "success");
    
  } catch (err) {
    console.error("Erro no motor de criptografia:", err);
    if(typeof showToast === "function") showToast("Falha ao aplicar a senha de segurança.", "error");
  }
}

/* --- FERRAMENTA: EXTRAIR E ORGANIZAR --- */
async function executarExtrair(loadedPdfs) {
  // 1. Define quais páginas processar
  // Se houver páginas selecionadas (via checkbox), extrai apenas elas.
  // Se nada estiver selecionado, assume que o usuário quer salvar a organização atual (todas).
  const selectedPages = pdfState.filter(p => p.selected);
  const targetPages = selectedPages.length > 0 ? selectedPages : pdfState;

  if (targetPages.length === 0) {
    if(typeof showToast === "function") showToast("Nenhuma página selecionada ou disponível.", "warning");
    return;
  }

  // 2. Cria o novo PDF
  const newPdf = await PDFLib.PDFDocument.create();

  // 3. Usa o motor otimizado para montar o PDF com a ordem atual da mesa
  await montarPdfOtimizado(newPdf, targetPages, loadedPdfs);

  // 4. Salva e baixa
  const pdfBytes = await newPdf.save();
  baixarArquivo(pdfBytes, "Extraido_Organizado.pdf");

  if(typeof showToast === "function") showToast("Extração e organização concluída!", "success");
}

async function executarOCR(loadedPdfs) {
  const pagesWithOcr = pdfState.filter(p => p.extractedText && p.extractedText.trim().length > 0);

  if (pagesWithOcr.length === 0) return;

  mostrarLoaderGlobal("Gravando texto posicional (Word-by-Word)...");

  try {
    const newPdf = await PDFLib.PDFDocument.create();
    const font = await newPdf.embedFont(PDFLib.StandardFonts.Helvetica);

    for (let i = 0; i < pagesWithOcr.length; i++) {
      const pageDef = pagesWithOcr[i];
      
      console.log("🔥 [AUDITORIA 5] Iniciando gravação binária da página:", pageDef.id);
      console.log("🔥 [AUDITORIA 6] Chaves disponíveis no cache neste momento exato:", Object.keys(ocrWordCache));

      const sourcePdfDoc = loadedPdfs[pageDef.sourceFileId];
      const [copiedPage] = await newPdf.copyPages(sourcePdfDoc, [pageDef.originalPageNum - 1]);
      const finalPage = newPdf.addPage(copiedPage);
      
      const { width, height } = finalPage.getSize();
      const scaleX = width / pageDef.ocrCanvasWidth;
      const scaleY = height / pageDef.ocrCanvasHeight;

      // Puxa as palavras do cache global
      const words = ocrWordCache[pageDef.id];
      
      console.log("🔥 [AUDITORIA 7] Palavras recuperadas na hora de gravar:", words ? words.length : "NULA/VAZIA");

      if (words && words.length > 0) {
        words.forEach(word => {
          try {
            let text = word.text ? word.text.trim() : "";
            text = text.replace(/[^\x20-\x7E\xA0-\xFF]/g, ''); 
            if (!text || !word.bbox) return;

            const wordWidthCanvas = word.bbox.x1 - word.bbox.x0;
            const wordHeightCanvas = word.bbox.y1 - word.bbox.y0;

            const pdfX = word.bbox.x0 * scaleX;
            const pdfFontSize = Math.max(4, wordHeightCanvas * scaleY); 
            const pdfY = height - (word.bbox.y1 * scaleY) + (pdfFontSize * 0.25); 

            const textWidthInFont = font.widthOfTextAtSize(text, pdfFontSize);
            const targetWidthInPdf = wordWidthCanvas * scaleX;
            
            if (isNaN(pdfX) || isNaN(pdfY) || pdfFontSize <= 0 || textWidthInFont <= 0) return;

            finalPage.drawText(text, {
              x: pdfX,
              y: pdfY,
              size: pdfFontSize, 
              font: font,
              color: PDFLib.rgb(1, 1, 1), 
              opacity: 0.01, 
            });
          } catch (e) {}
        });
      } else {
        console.warn("🔥 [AUDITORIA 8] Culpado Encontrado: Plano B executado para a página " + pageDef.id);
        finalPage.drawText(pageDef.extractedText, { x: 20, y: height - 20, size: 4, font: font, color: PDFLib.rgb(1, 1, 1), opacity: 0.01 });
      }
    }

    mostrarLoaderGlobal("Preparando Download...");
    const pdfBytes = await newPdf.save();
    baixarArquivo(pdfBytes, "Documento_Pesquisavel_OCR.pdf");
    
  } catch (err) {
    console.error("Erro ao gravar OCR:", err);
  } finally {
    ocultarLoaderGlobal();
  }
}

/* --- FERRAMENTA: NUMERAR PÁGINAS (VERSÃO PRO - CORRIGIDA) --- */
async function executarPaginar(loadedPdfs) {
  // 1. Coleta de Configurações da UI
  const isFacingPages = document.getElementById('pag-mode').value === 'facing';
  const ignoreCover   = document.getElementById('pag-cover').checked;
  const positionStr   = document.getElementById('pag-pos').value;
  const textFormat    = document.getElementById('pag-format').value;
  const fontFamily    = document.getElementById('pag-font').value;
  const fontSize      = parseInt(document.getElementById('pag-size').value, 10) || 12;
  const isBold        = document.getElementById('pag-bold').checked; // Declarado apenas aqui
  const hexColor      = document.getElementById('pag-color').value;
  
  // Controle de Numeração
  let currentNumber   = parseInt(document.getElementById('pag-start-val').value, 10) || 1;
  const rangeStartRaw = document.getElementById('pag-range-start').value;
  const rangeEndRaw   = document.getElementById('pag-range-end').value;

  // 2. Criar novo documento
  const newPdf = await PDFLib.PDFDocument.create();
  await montarPdfOtimizado(newPdf, pdfState, loadedPdfs);
  const pages = newPdf.getPages();
  const totalPages = pages.length;

  // Filtros de Intervalo (Fallback para documento inteiro se vazio)
  const rangeStart = rangeStartRaw ? Math.max(1, parseInt(rangeStartRaw, 10)) : 1;
  const rangeEnd   = rangeEndRaw ? Math.min(totalPages, parseInt(rangeEndRaw, 10)) : totalPages;

  // 3. Conversão de Cor (HEX para RGB do PDFLib)
  const r = parseInt(hexColor.substring(1, 3), 16) / 255;
  const g = parseInt(hexColor.substring(3, 5), 16) / 255;
  const b = parseInt(hexColor.substring(5, 7), 16) / 255;
  const pdfColor = PDFLib.rgb(r, g, b);

  // 4. Carregamento de Fonte Seguro (usando Mapa)
  // A variável 'isBold' aqui é a mesma declarada no início da função (sem erro de redeclaração)
  const fontKey = fontFamily + (isBold ? 'Bold' : '');
  
  // Mapa de segurança contra erros de digitação e nomes de fontes inválidos
  const fontMap = {
    'Helvetica': PDFLib.StandardFonts.Helvetica,
    'HelveticaBold': PDFLib.StandardFonts.HelveticaBold,
    'TimesRoman': PDFLib.StandardFonts.TimesRoman,
    'TimesRomanBold': PDFLib.StandardFonts.TimesRomanBold
  };

  // Se a fonte não existir no mapa, cai na Helvetica padrão para não travar o sistema
  const selectedFont = fontMap[fontKey] || PDFLib.StandardFonts.Helvetica;
  const font = await newPdf.embedFont(selectedFont);

  // 5. Iterar sobre as páginas aplicando a lógica
  pages.forEach((page, index) => {
    const physicalPageNum = index + 1;

    // Ignora se estiver fora do "De-Até" configurado
    if (physicalPageNum < rangeStart || physicalPageNum > rangeEnd) return;

    // Lógica da Capa (Ignora a página 1 e não incrementa o contador)
    if (ignoreCover && physicalPageNum === 1) return;

    const { width, height } = page.getSize();
    const margin = 35; // Margem padrão de segurança

    // Constrói o texto final substituindo as macros
    const displayText = textFormat
      .replace('{n}', currentNumber.toString())
      .replace('{total}', ignoreCover ? (totalPages - 1).toString() : totalPages.toString());

    const textWidth = font.widthOfTextAtSize(displayText, fontSize);

    // --- LÓGICA DE POSIÇÃO E PÁGINA DUPLA ---
    let actualPos = positionStr;

    // Espelhamento: Se "Páginas Duplas" estiver ativo, inverte a margem lateral em páginas pares
    if (isFacingPages) {
      const isEvenPage = (physicalPageNum % 2 === 0);
      if (isEvenPage) {
        if (actualPos.includes('right')) actualPos = actualPos.replace('right', 'left');
        else if (actualPos.includes('left')) actualPos = actualPos.replace('left', 'right');
      }
    }

    // Calcula X e Y baseado na posição final
    let x = margin, y = margin;
    const parts = actualPos.split('-');

    // Eixo Y
    if (parts[0] === 'top') y = height - margin - fontSize;
    else if (parts[0] === 'bottom') y = margin;
    else y = (height / 2) - (fontSize / 2);

    // Eixo X
    if (parts[1] === 'left') x = margin;
    else if (parts[1] === 'right') x = width - margin - textWidth;
    else x = (width / 2) - (textWidth / 2); // Center

    // 6. Desenha na página
    page.drawText(displayText, {
      x: x,
      y: y,
      size: fontSize,
      font: font,
      color: pdfColor,
    });

    // Incrementa apenas após numerar uma página válida
    currentNumber++;
  });

  // 7. Salvar e Baixar
  const pdfBytes = await newPdf.save();
  baixarArquivo(pdfBytes, "Documento_Numerado.pdf");
  
  if (typeof showToast === "function") showToast("Numeração aplicada com sucesso!", "success");
}

/* --- FERRAMENTA: ASSINAR PDF (COM 9 POSIÇÕES GEOMÉTRICAS) --- */
async function executarAssinar(loadedPdfs) {
  const mode = document.getElementById('sign-active-mode').value;
  const contentMode = document.getElementById('sign-content-mode').value;
  const color = document.getElementById('sign-active-color').value;
  const position = document.getElementById('sign-position').value; 
  
  const selectedPages = pdfState.filter(p => p.selected);
  const pagesToProcess = selectedPages.length > 0 ? selectedPages : pdfState;

  if (pagesToProcess.length === 0) {
    if (typeof showToast === "function") showToast("Selecione ao menos uma página para assinar.", "warning");
    return;
  }

  mostrarLoaderGlobal("Posicionando assinatura e gerando documento...");

  try {
    let signatureImageBase64 = "";

    if (mode === 'type') {
      const textRaw = document.getElementById('sign-text-input').value.trim();
      if (!textRaw) throw new Error("Digite um nome para a assinatura.");
      
      const isBold = document.getElementById('sign-is-bold').value === "true";
      const isItalic = document.getElementById('sign-is-italic').value === "true";
      
      let textFinal = textRaw;
      if (contentMode === 'initials') {
          textFinal = textRaw.split(' ').map(n => n.trim()[0]).filter(Boolean).join('').toUpperCase();
      }

      signatureImageBase64 = gerarImagemTextoAssinatura(textFinal, color, isBold, isItalic);
    } else {
      // Magia para colorir o desenho antes de embutir no PDF (Trocando pixels pretos pela cor)
      const canvasRaw = document.getElementById('sign-draw-data').value;
      if (!canvasRaw) throw new Error("Você precisa desenhar a assinatura primeiro.");
      
      // Cria um canvas temporário para aplicar a cor na imagem desenhada
      const tempImg = new Image();
      tempImg.src = canvasRaw;
      await new Promise(r => tempImg.onload = r);
      
      const tempC = document.createElement('canvas');
      tempC.width = tempImg.width; tempC.height = tempImg.height;
      const tCtx = tempC.getContext('2d');
      tCtx.drawImage(tempImg, 0, 0);
      tCtx.globalCompositeOperation = "source-in";
      tCtx.fillStyle = color;
      tCtx.fillRect(0, 0, tempC.width, tempC.height);
      
      signatureImageBase64 = tempC.toDataURL('image/png');
    }

    const imgBytes = Uint8Array.from(atob(signatureImageBase64.split(',')[1]), c => c.charCodeAt(0));
    const newPdf = await PDFLib.PDFDocument.create();
    const embeddedSign = await newPdf.embedPng(imgBytes);
    
    const signDims = embeddedSign.scaleToFit(180, 60);

    for (let i = 0; i < pagesToProcess.length; i++) {
      const pageInfo = pagesToProcess[i];
      const sourcePdf = loadedPdfs[pageInfo.sourceFileId];
      const [copiedPage] = await newPdf.copyPages(sourcePdf, [pageInfo.originalPageNum - 1]);
      
      const { width, height } = copiedPage.getSize();
      let posX = 0;
      let posY = 0;
      const margin = 40; 

      // 🟢 MATEMÁTICA DAS 9 POSIÇÕES
      switch (position) {
        case 'bottom-right':  posX = width - signDims.width - margin; posY = margin; break;
        case 'bottom-left':   posX = margin; posY = margin; break;
        case 'bottom-center': posX = (width - signDims.width) / 2; posY = margin; break;
        
        case 'top-right':     posX = width - signDims.width - margin; posY = height - signDims.height - margin; break;
        case 'top-left':      posX = margin; posY = height - signDims.height - margin; break;
        case 'top-center':    posX = (width - signDims.width) / 2; posY = height - signDims.height - margin; break;
        
        case 'center-right':  posX = width - signDims.width - margin; posY = (height - signDims.height) / 2; break;
        case 'center-left':   posX = margin; posY = (height - signDims.height) / 2; break;
        case 'center':        posX = (width - signDims.width) / 2; posY = (height - signDims.height) / 2; break;
      }
      
      copiedPage.drawImage(embeddedSign, {
        x: posX, y: posY, width: signDims.width, height: signDims.height,
      });

      newPdf.addPage(copiedPage);
    }

    const pdfBytes = await newPdf.save();
    baixarArquivo(new Blob([pdfBytes], {type: "application/pdf"}), "Documento_Assinado.pdf");
    if (typeof showToast === "function") showToast("Documento assinado com sucesso!", "success");

  } catch(err) {
    console.error("Erro ao assinar:", err);
    if (typeof showToast === "function") showToast(err.message || "Erro ao processar assinatura.", "error");
  } finally {
    ocultarLoaderGlobal();
  }
}

/* --- FUNÇÃO AUXILIAR: Gera um PNG transparente a partir do texto digitado --- */
function gerarImagemTextoAssinatura(texto, cor, isBold, isItalic) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  
  canvas.width = 800;
  canvas.height = 150;
  
  const fontWeight = isBold ? 'bold' : 'normal';
  const fontStyle = isItalic ? 'italic' : 'normal';
  
  // Aplica as propriedades selecionadas
  ctx.font = `${fontStyle} ${fontWeight} 60px 'Brush Script MT', 'Bradley Hand', cursive`;
  ctx.fillStyle = cor;
  ctx.textBaseline = "middle";
  
  ctx.fillText(texto, 10, canvas.height / 2);
  
  const metrics = ctx.measureText(texto);
  const textWidth = Math.ceil(metrics.actualBoundingBoxRight + metrics.actualBoundingBoxLeft + 30);
  
  const finalCanvas = document.createElement("canvas");
  finalCanvas.width = textWidth;
  finalCanvas.height = canvas.height;
  const finalCtx = finalCanvas.getContext("2d");
  finalCtx.drawImage(canvas, 0, 0);

  return finalCanvas.toDataURL("image/png");
}

/* --- FERRAMENTA: REPARAR PDF (RE-SERIALIZAÇÃO) --- */
async function executarReparar() {
  if (Object.keys(sourcePdfs).length === 0) {
    return showToast("Nenhum PDF carregado para reparar.", "warning");
  }

  // 1. Criar novo documento destino
  const repairedPdf = await PDFLib.PDFDocument.create();

  // 2. Processar cada arquivo original que está na memória (sourcePdfs)
  for (let fileId in sourcePdfs) {
    try {
      // A MÁGICA: O ignoreEncryption contorna corrupções de header/acesso
      const corruptPdf = await PDFLib.PDFDocument.load(sourcePdfs[fileId], {
        ignoreEncryption: true,
        updateMetadata: false // Mantém ou não os metadados originais (opcional)
      });

      // Copia todas as páginas do arquivo "sujo" para o novo objeto "limpo"
      const pageIndices = corruptPdf.getPageIndices();
      const copiedPages = await repairedPdf.copyPages(corruptPdf, pageIndices);
      
      copiedPages.forEach(page => repairedPdf.addPage(page));

    } catch (err) {
      console.error(`Erro ao tentar reparar arquivo ${fileId}:`, err);
      if(typeof showToast === "function") showToast(`Erro ao reparar arquivo ${fileId}`, "error");
    }
  }

  // 3. Serialização: Ao salvar, o pdf-lib reconstrói a estrutura do PDF
  const pdfBytes = await repairedPdf.save();
  
  // 4. Download do PDF Reparado
  baixarArquivo(pdfBytes, "PDF_Reparado.pdf");
  
  if(typeof showToast === "function") showToast("PDF reparado e re-estruturado!", "success");
}

/* --- FERRAMENTA: MARCA D'ÁGUA (VERSÃO PRO - CONSOLIDADA) --- */
async function executarMarcaDagua(loadedPdfs) {
  // 1. Coleta de Configurações da UI
  const text        = document.getElementById('wm-text').value || "CONFIDENCIAL";
  const fontFamily  = document.getElementById('wm-font').value;
  const fontSize    = parseInt(document.getElementById('wm-size').value, 10) || 48;
  const isBold      = document.getElementById('wm-bold').checked;
  const hexColor    = document.getElementById('wm-color').value;
  
  const positionStr = document.getElementById('wm-pos').value;
  const isMosaic    = document.getElementById('wm-mosaic').checked;
  const rotationDeg = parseInt(document.getElementById('wm-rotation').value, 10) || 0;
  const opacity     = parseFloat(document.getElementById('wm-opacity').value) || 0.3;

  const rangeStartRaw = document.getElementById('wm-range-start').value;
  const rangeEndRaw   = document.getElementById('wm-range-end').value;

  // 2. Criar novo documento
  const newPdf = await PDFLib.PDFDocument.create();
  await montarPdfOtimizado(newPdf, pdfState, loadedPdfs);
  const pages = newPdf.getPages();
  const totalPages = pages.length;

  // Filtros de Intervalo
  const rangeStart = rangeStartRaw ? Math.max(1, parseInt(rangeStartRaw, 10)) : 1;
  const rangeEnd   = rangeEndRaw ? Math.min(totalPages, parseInt(rangeEndRaw, 10)) : totalPages;

  // 3. Setup de Estilos (Cor e Fonte Seguro)
  // Conversão de Cor HEX para RGB do PDFLib
  const r = parseInt(hexColor.substring(1, 3), 16) / 255;
  const g = parseInt(hexColor.substring(3, 5), 16) / 255;
  const b = parseInt(hexColor.substring(5, 7), 16) / 255;
  const pdfColor = PDFLib.rgb(r, g, b);

  // Mapeamento de Fontes (Solução do erro "undefined font")
  const fontKey = fontFamily + (isBold ? 'Bold' : '');
  const fontMap = {
    'Helvetica': PDFLib.StandardFonts.Helvetica,
    'HelveticaBold': PDFLib.StandardFonts.HelveticaBold,
    'TimesRoman': PDFLib.StandardFonts.TimesRoman,
    'TimesRomanBold': PDFLib.StandardFonts.TimesRomanBold
  };

  // Se a chave não existir no mapa, cai na Helvetica padrão para evitar travamento
  const selectedFont = fontMap[fontKey] || PDFLib.StandardFonts.Helvetica;
  const font = await newPdf.embedFont(selectedFont);
  
  const textWidth = font.widthOfTextAtSize(text, fontSize);
  const textHeight = font.heightAtSize(fontSize);

  // 4. Iterar sobre as páginas
  pages.forEach((page, index) => {
    const physicalPageNum = index + 1;
    if (physicalPageNum < rangeStart || physicalPageNum > rangeEnd) return;

    const { width, height } = page.getSize();
    const margin = 50;

    // Função interna para desenhar com os mesmos atributos
    const drawStamp = (x, y) => {
      page.drawText(text, {
        x: x,
        y: y,
        size: fontSize,
        font: font,
        color: pdfColor,
        opacity: opacity,
        rotate: PDFLib.degrees(rotationDeg)
      });
    };

    // --- LÓGICA DE DESENHO ---
    if (isMosaic) {
      // Cria uma grade (grid) que ultrapassa os limites da página para cobrir as bordas após a rotação
      const stepX = textWidth + 100; // Espaçamento horizontal
      const stepY = textHeight + 100; // Espaçamento vertical
      
      for (let currX = -width; currX < width * 2; currX += stepX) {
        for (let currY = -height; currY < height * 2; currY += stepY) {
          drawStamp(currX, currY);
        }
      }
    } else {
      // Posição Singular
      let x = margin, y = margin;
      
      // Eixo Y
      if (positionStr.includes('top')) y = height - margin - textHeight;
      else if (positionStr.includes('bottom')) y = margin;
      else y = (height / 2) - (textHeight / 2); // Center

      // Eixo X
      if (positionStr.includes('left')) x = margin;
      else if (positionStr.includes('right')) x = width - margin - textWidth;
      else x = (width / 2) - (textWidth / 2); // Center

      // Ajuste fino para rotação no centro
      if (positionStr === 'center' && rotationDeg !== 0) {
         if(rotationDeg === 45) { y -= textWidth/4; x += textHeight; }
         if(rotationDeg === 315) { y += textWidth/4; x -= textHeight/2; }
      }

      drawStamp(x, y);
    }
  });

  // 5. Salvar e Baixar
  const pdfBytes = await newPdf.save();
  baixarArquivo(pdfBytes, "Documento_Com_Marca_Dagua.pdf");
  
  if (typeof showToast === "function") showToast("Marca d'água aplicada!", "success");
}

/* --- FERRAMENTA: EDITAR METADADOS (E LIMPEZA DE RASTROS) --- */
async function executarMetadados(loadedPdfs) {
  const selectedPages = pdfState.filter(p => p.selected);
  const pagesToProcess = selectedPages.length > 0 ? selectedPages : pdfState;

  if (pagesToProcess.length === 0) {
    if (typeof showToast === "function") showToast("Nenhuma página disponível.", "warning");
    return;
  }

  // 1. Coleta os valores digitados na interface
  const title = document.getElementById('meta-title').value.trim();
  const author = document.getElementById('meta-author').value.trim();
  const subject = document.getElementById('meta-subject').value.trim();
  const keywordsStr = document.getElementById('meta-keywords').value.trim();

  mostrarLoaderGlobal("Aplicando propriedades do documento...");

  try {
    const newPdf = await PDFLib.PDFDocument.create();
    
    // 2. Monta o PDF com as páginas selecionadas
    await montarPdfOtimizado(newPdf, pagesToProcess, loadedPdfs);

    // 3. Aplica os metadados (Se a string for vazia, ele sobrescreve/limpa o que havia no original)
    if (title) newPdf.setTitle(title); else newPdf.setTitle('');
    if (author) newPdf.setAuthor(author); else newPdf.setAuthor('');
    if (subject) newPdf.setSubject(subject); else newPdf.setSubject('');
    
    if (keywordsStr) {

      const keywordsArray = keywordsStr.split(',').map(k => k.trim()).filter(k => k.length > 0);
      newPdf.setKeywords(keywordsArray);
    } else {
      newPdf.setKeywords([]); // Limpa as palavras-chave
    }

    // 4. Carimba o "Produtor" do arquivo para dar um toque profissional ao seu sistema
    newPdf.setCreator('PDF Studio');
    newPdf.setProducer('PDF Studio');

    // 5. Salva e entrega o arquivo final
    const pdfBytes = await newPdf.save();
    baixarArquivo(new Blob([pdfBytes], {type: "application/pdf"}), title ? `${title.replace(/\s+/g, '_')}.pdf` : "Documento_Metadados.pdf");

  } catch(err) {
    console.error("Erro ao aplicar metadados:", err);
    if (typeof showToast === "function") showToast("Falha ao modificar as propriedades do documento.", "error");
  } finally {
    ocultarLoaderGlobal();
  }
}

/* --- FERRAMENTA: COMPRIMIR PDF (BLINDADA CONTRA TRAVAMENTOS DE MEMÓRIA) --- */
async function executarComprimir(loadedPdfs) {
  const level = document.getElementById('compress-level').value;
  const selectedPages = pdfState.filter(p => p.selected);
  const pagesToProcess = selectedPages.length > 0 ? selectedPages : pdfState;

  if (pagesToProcess.length === 0) {
    if (typeof showToast === "function") showToast("Nenhuma página disponível.", "warning");
    return;
  }

  mostrarLoaderGlobal(`Aplicando compressão (${level}). Isso pode levar um momento...`);

  try {
    if (level === 'low') {
      // 🟢 MODO: BAIXA COMPRESSÃO (Lossless / Limpeza Estrutural)
      const newPdf = await PDFLib.PDFDocument.create();
      await montarPdfOtimizado(newPdf, pagesToProcess, loadedPdfs);
      
      // Remove metadados que ocupam espaço desnecessário
      newPdf.setTitle('');
      newPdf.setAuthor('');
      newPdf.setSubject('');
      newPdf.setKeywords([]);
      
      const pdfBytes = await newPdf.save();
      baixarArquivo(new Blob([pdfBytes], {type: "application/pdf"}), "Comprimido_AltaQualidade.pdf");
      if (typeof showToast === "function") showToast("Compressão concluída (Limpeza estrutural)!", "success");
      
    } else {
      // 🔴 MODO: RECOMENDADA / EXTREMA (Rasterização)
      const newPdf = await PDFLib.PDFDocument.create();
      
      const scaleMulti = level === 'extreme' ? 1.0 : 1.5; 
      const jpegQuality = level === 'extreme' ? 0.5 : 0.75;

      for (let i = 0; i < pagesToProcess.length; i++) {
        // 🛡️ PROTEÇÃO 1: Dá um respiro de 50ms pro navegador não congelar a aba
        await new Promise(resolve => setTimeout(resolve, 50));

        const pageInfo = pagesToProcess[i];
        const arrayBuffer = sourcePdfs[pageInfo.sourceFileId];
        const pdf = await pdfjsLib.getDocument({
          data: new Uint8Array(arrayBuffer),
          cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
          cMapPacked: true,
          standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/standard_fonts/',
          useWorkerFetch: true
        }).promise;
        const page = await pdf.getPage(pageInfo.originalPageNum);
        
        const viewport = page.getViewport({ scale: scaleMulti });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 🛡️ PROTEÇÃO 2: Try/Catch isolado para a renderização. 
        // Se a página estiver muito corrompida, ele ignora o erro e segue em frente
        try {
          await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        } catch (renderError) {
          console.warn(`Página ${pageInfo.originalPageNum} ignorou erros visuais:`, renderError);
        }
        
        const base64Img = canvas.toDataURL('image/jpeg', jpegQuality);
        
        // 🛡️ PROTEÇÃO 3: Conversão segura de Base64 em vez de oneliner pesado
        const binaryString = atob(base64Img.split(',')[1]);
        const imgBytes = new Uint8Array(binaryString.length);
        for (let j = 0; j < binaryString.length; j++) {
          imgBytes[j] = binaryString.charCodeAt(j);
        }
        
        const embeddedImg = await newPdf.embedJpg(imgBytes);
        const newPage = newPdf.addPage([viewport.width, viewport.height]);
        newPage.drawImage(embeddedImg, {
          x: 0,
          y: 0,
          width: viewport.width,
          height: viewport.height,
        });

        // 🛡️ PROTEÇÃO 4: Limpeza imediata da Memória RAM (Garbage Collection)
        canvas.width = 0;
        canvas.height = 0;
        page.cleanup(); // Força o pdf.js a soltar os dados da página
      }
      
      const pdfBytes = await newPdf.save();
      baixarArquivo(new Blob([pdfBytes], {type: "application/pdf"}), `Comprimido_${level.toUpperCase()}.pdf`);
      if (typeof showToast === "function") showToast("Compressão avançada concluída!", "success");
    }
  } catch(err) {
    console.error("Erro na compressão:", err);
    if (typeof showToast === "function") showToast("Erro ao processar a compressão.", "error");
  } finally {
    ocultarLoaderGlobal();
  }
}

/* --- FERRAMENTA: TONS DE CINZA (COM SUPORTE A OCR E BLINDAGEM DE MEMÓRIA) --- */
async function executarTonsDeCinza(loadedPdfs) {
  const selectedPages = pdfState.filter(p => p.selected);
  const pagesToProcess = selectedPages.length > 0 ? selectedPages : pdfState;

  if (pagesToProcess.length === 0) {
    if (typeof showToast === "function") showToast("Nenhuma página disponível.", "warning");
    return;
  }

  mostrarLoaderGlobal("Removendo cores do documento. Isso pode levar alguns segundos...");

  try {
    const newPdf = await PDFLib.PDFDocument.create();
    const scaleMulti = 1.5;

    for (let i = 0; i < pagesToProcess.length; i++) {
      // 🛡️ PROTEÇÃO 1: Respiro de 50ms para evitar o congelamento da aba
      await new Promise(resolve => setTimeout(resolve, 50));

      const pageInfo = pagesToProcess[i];
      const arrayBuffer = sourcePdfs[pageInfo.sourceFileId];
      const pdf = await pdfjsLib.getDocument({
        data: new Uint8Array(arrayBuffer),
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
        cMapPacked: true,
        standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/standard_fonts/',
        useWorkerFetch: true
      }).promise;
      const page = await pdf.getPage(pageInfo.originalPageNum);
      
      const viewport = page.getViewport({ scale: scaleMulti });
      
      const canvasOriginal = document.createElement('canvas');
      canvasOriginal.width = viewport.width;
      canvasOriginal.height = viewport.height;
      const ctxOriginal = canvasOriginal.getContext('2d');
      
      ctxOriginal.fillStyle = '#FFFFFF';
      ctxOriginal.fillRect(0, 0, canvasOriginal.width, canvasOriginal.height);
      
      // 🛡️ PROTEÇÃO 2: Try/Catch isolado. Ignora erros visuais e força a pintura
      try {
        await page.render({ canvasContext: ctxOriginal, viewport: viewport }).promise;
      } catch (renderError) {
        console.warn(`Página ${pageInfo.originalPageNum} ignorou erros visuais:`, renderError);
      }
      
      const canvasBW = document.createElement('canvas');
      canvasBW.width = viewport.width;
      canvasBW.height = viewport.height;
      const ctxBW = canvasBW.getContext('2d');
      
      ctxBW.filter = 'grayscale(100%)';
      ctxBW.drawImage(canvasOriginal, 0, 0);
      
      const base64Img = canvasBW.toDataURL('image/jpeg', 0.85);
      
      // 🛡️ PROTEÇÃO 3: Conversão iterativa para evitar "Call Stack Exceeded"
      const binaryString = atob(base64Img.split(',')[1]);
      const imgBytes = new Uint8Array(binaryString.length);
      for (let j = 0; j < binaryString.length; j++) {
        imgBytes[j] = binaryString.charCodeAt(j);
      }
      
      const embeddedImg = await newPdf.embedJpg(imgBytes);
      const newPage = newPdf.addPage([viewport.width, viewport.height]);
      
      newPage.drawImage(embeddedImg, {
        x: 0,
        y: 0,
        width: viewport.width,
        height: viewport.height,
      });

      // 🛡️ PROTEÇÃO 4: Lixeira Imediata. Desocupa a memória RAM dos 2 canvas
      canvasOriginal.width = 0;
      canvasOriginal.height = 0;
      canvasBW.width = 0;
      canvasBW.height = 0;
      page.cleanup();
    }
    
    // Geração do PDF final
    const pdfBytes = await newPdf.save();
    
    // VERIFICAÇÃO DE ENCADEAMENTO OCR
    const chkOcr = document.getElementById('gray-apply-ocr');
    const aplicarOcr = chkOcr && chkOcr.checked;

    if (aplicarOcr) {
      if (typeof showToast === "function") showToast("Tons de cinza aplicado. Iniciando OCR...", "info");
      
      const fileIdPB = generateId();
      sourcePdfs[fileIdPB] = pdfBytes.buffer;
      
      const loadedPdfsVirtual = {};
      loadedPdfsVirtual[fileIdPB] = await PDFLib.PDFDocument.load(pdfBytes, { ignoreEncryption: true });

      const backupPdfState = [...pdfState]; 
      
      pdfState = [];
      const numPages = newPdf.getPageCount();
      for (let j = 1; j <= numPages; j++) {
        pdfState.push({ 
          sourceFileId: fileIdPB, 
          originalPageNum: j, 
          selected: true, 
          filename: "Documento_PB.pdf" 
        });
      }
      
      await executarOCR(loadedPdfsVirtual);
      pdfState = backupPdfState; 

    } else {
      baixarArquivo(new Blob([pdfBytes], {type: "application/pdf"}), "Documento_PB.pdf");
      if (typeof showToast === "function") showToast("Conversão para Tons de Cinza concluída!", "success");
    }

  } catch(err) {
    console.error("Erro na ferramenta Tons de Cinza:", err);
    if (typeof showToast === "function") showToast("Falha ao remover as cores do documento.", "error");
  } finally {
    ocultarLoaderGlobal();
  }
}

/* ==========================================================================
   RAIO-X DO PDF: ESTATÍSTICAS PROFUNDAS (LAYOUT CORRIGIDO E BOTÃO OCULTO)
   ========================================================================== */
async function executarEstatisticasPDF() {
  if (typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("Fazendo raio-X estrutural direto na fonte (Deep Scan)...");

  try {
    const chavesFontes = Object.keys(sourcePdfs);
    if (chavesFontes.length === 0) throw new Error("Nenhum arquivo base encontrado na memória do sistema.");

    const paginasSelecionadas = pdfState.filter(p => p.selected);

    let globalCaracteres = 0, globalPalavras = 0, globalImagens = 0, globalCampos = 0, globalPaginasLidas = 0;
    const dadosPorArquivo = {};

    for (let fileId of chavesFontes) {
      let fileData = sourcePdfs[fileId];
      if (!fileData) continue; 

      let bufferParaLeitura = (typeof fileData.arrayBuffer === 'function') ? await fileData.arrayBuffer() : fileData; 
      let pdfDoc = await pdfjsLib.getDocument({ data: bufferParaLeitura }).promise;

      let nomeRealArquivo = fileData.name || fileData.fileName || fileId;
      dadosPorArquivo[fileId] = { nome: nomeRealArquivo, paginas: [], caracteres: 0, palavras: 0, imagens: 0, campos: 0 };

      const totalPaginasFisicas = pdfDoc.numPages;

      for (let pageNum = 1; pageNum <= totalPaginasFisicas; pageNum++) {
        let page;
        try {
          page = await pdfDoc.getPage(pageNum);
        } catch (err) {
          console.warn(`[Raio-X] A página física ${pageNum} do arquivo ${nomeRealArquivo} está corrompida. Pulando.`);
          continue; 
        }

        const textContent = await page.getTextContent();
        let pageText = textContent.items.map(item => item.str).join('\n'); 
        let caracteres = pageText.replace(/\s/g, '').length; 
        let palavras = pageText.trim() === "" ? 0 : pageText.trim().split(/\s+/).filter(w => w.length > 0).length;

        const annotations = await page.getAnnotations();
        const formFields = annotations.filter(a => a.subtype === 'Widget').length;

        const opList = await page.getOperatorList();
        let imgCount = 0;
        if (pdfjsLib.OPS) {
            opList.fnArray.forEach(fn => {
              if (fn === pdfjsLib.OPS.paintImageXObject || fn === pdfjsLib.OPS.paintJpegXObject || fn === pdfjsLib.OPS.paintImageMaskXObject) {
                imgCount++;
              }
            });
        }

        dadosPorArquivo[fileId].caracteres += caracteres;
        dadosPorArquivo[fileId].palavras += palavras;
        dadosPorArquivo[fileId].imagens += imgCount;
        dadosPorArquivo[fileId].campos += formFields;
        dadosPorArquivo[fileId].paginas.push({
          num: pageNum, caracteres, palavras, imagens: imgCount, campos: formFields
        });

        globalCaracteres += caracteres;
        globalPalavras += palavras;
        globalImagens += imgCount;
        globalCampos += formFields;
        globalPaginasLidas++;
      }
    }

    // =====================================================================
    // CONSTRUÇÃO INTERFACE (DASHBOARD E ALERTAS)
    // =====================================================================
    let htmlRelatorio = "";

    if (paginasSelecionadas.length > 0) {
       htmlRelatorio += `
       <div class="d-flex align-items-center gap-2 mb-3 p-2 rounded" style="background-color:#eff6ff; border-left:4px solid #3b82f6; box-shadow:0 1px 2px rgba(0,0,0,0.05);">
          <i class="material-icons text-primary fs-3">info</i>
          <div>
            <h6 class="text-primary fw-bold m-0" style="font-size:13px;">Leitura Global Ativa</h6>
            <p class="m-0 text-muted" style="font-size:11px; line-height:1.2;">Mesmo com páginas selecionadas na mesa, realizamos um escaneamento profundo de <b>todos os arquivos fontes carregados</b> para estatísticas 100% fiéis.</p>
          </div>
       </div>`;
    }

    if (globalCaracteres === 0 && globalImagens > 0) {
      htmlRelatorio += `
        <div class="d-flex align-items-center gap-2 mb-3 p-2 rounded" style="background-color:#fee2e2; border-left:4px solid #ef4444; box-shadow:0 1px 2px rgba(0,0,0,0.05);">
