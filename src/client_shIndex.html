  <style>
    /* Trava o body para evitar rolagem dupla no navegador */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8fafc; }
    
    /* =========================================================
       HEADER ANIMADO E MODERNO
       ========================================================= */
    .pdf-header {
      height: 65px;
      /* Gradiente com 4 tons de azul/roxo institucional */
      background: linear-gradient(-45deg, #004a8d, #0066c1, #003b73, #00529b);
      background-size: 400% 400%;
      animation: gradientFlow 12s ease infinite;

      display: flex;
      align-items: center;
      z-index: 1050;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .logo-circle {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
    }

    /* Badge "Em fase de teste" com efeito de pulso */
    .badge-testing {
      background: rgba(245, 158, 11, 0.15);
      padding: 6px 14px;
      border-radius: 20px;
      color: #fbbf24;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      border: 1px solid rgba(245, 158, 11, 0.4);
      animation: pulseWarning 2s infinite;
    }

    @keyframes pulseWarning {
      0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
      100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }

    /* =========================================================
       CONTAINER CENTRAL
       ========================================================= */
    .app-container { 
      /* Altura total (100vh) - Header (65px) - Footer (35px) = 100px descontados */
      height: calc(100vh - 100px); 
      width: 100vw; 
      display: flex; 
      flex-direction: column;
      overflow-y: auto; 
      overflow-x: hidden; 
    }

    /* Estilo Premium para a Barra de Rolagem */
    .app-container::-webkit-scrollbar { width: 8px; }
    .app-container::-webkit-scrollbar-track { background: #f1f5f9; }
    .app-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .app-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      font-size: 0.75rem;
      color: #64748b;

      font-weight: 600;

  <script>
  // Garantir a inicialização segura após injeção do componente
    document.addEventListener("DOMContentLoaded", function() {
      console.log("PDF Studio Pro: Casca carregada. Verificando motor...");
      
      setTimeout(() => {
        if (typeof window.PDF_STUDIO_INIT === 'function') {
          window.PDF_STUDIO_INIT();
          console.log("PDF Studio Pro: Motor inicializado com sucesso.");
        } else {
          console.error("PDF Studio: Função de inicialização não encontrada. Certifique-se de que a biblioteca gerou o script corretamente.");
        }
      }, 500);
    });

    // Script de Monitorização Automática (Heartbeat)
function dispararPingPresenca() {
  // Tenta capturar o modo atual da ferramenta se ele existir no escopo global
  const ferramenta = typeof appMode !== 'undefined' ? appMode : 'Painel Inicial';
  
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(() => console.log("Métrica de presença atualizada."))
      .withFailureHandler((err) => console.warn("Falha no ping:", err))
      .registrarSessaoAtiva(ferramenta);
  }
}

// Inicia o ciclo: envia o primeiro após 5s e repete a cada 30s
document.addEventListener("DOMContentLoaded", function() {
  setTimeout(() => {
    dispararPingPresenca();
    setInterval(dispararPingPresenca, 30000);
  }, 5000);
});
  </script>
</body>
